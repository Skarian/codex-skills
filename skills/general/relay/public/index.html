<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Relay Smoke</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main>
      <h1>Relay</h1>
      <p id="status">Ready.</p>

      <label>App <input id="app-name" value="debug-app"></label>
      <p>
        <button id="open">Open</button>
        <button id="send">Send</button>
        <button id="receive">Receive</button>
        <button id="close">Close</button>
      </p>

      <textarea id="payload">{
  "kind": "debug.need_agent",
  "question": "What should this app do next?"
}</textarea>

      <h2>Relay</h2>
      <pre id="relay"></pre>
      <h2>Replies</h2>
      <pre id="replies"></pre>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
